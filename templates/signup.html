<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ShopEasy</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="logo">
                    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" rx="10" fill="url(#lg3)"/><defs><linearGradient id="lg3" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#DB2777"/></linearGradient></defs><path d="M13 17 Q13 12 19 12 Q25 12 25 17" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/><rect x="11" y="17" width="16" height="12" rx="2.5" fill="white" opacity="0.92"/><line x1="19" y1="20" x2="19" y2="26" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="23" x2="22" y2="23" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round"/></svg>
                    <h1>ShopEasy</h1>
                </div>
            </div>
            
            <h2>Create Account</h2>
            <p class="subtitle">Sign up to start shopping</p>
            
            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required placeholder="First name">
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required placeholder="Last name">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter your phone">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password" minlength="6">
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            
            <p class="signup-link">Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>
    
    <script src="/static/js/signup.js"></script>
</body>
</html>
