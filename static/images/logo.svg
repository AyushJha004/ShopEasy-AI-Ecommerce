<!-- ShopEasy Logo SVG - modern shopping bag -->
<svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="38" height="38" rx="10" fill="url(#logoGrad)"/>
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
  </defs>
  <!-- bag handle -->
  <path d="M14 16 Q14 11 19 11 Q24 11 24 16" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- bag body -->
  <rect x="11" y="16" width="16" height="12" rx="2" fill="white" opacity="0.9"/>
  <!-- bag center line -->
  <line x1="19" y1="19" x2="19" y2="25" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="22" y2="22" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round"/>
</svg>
